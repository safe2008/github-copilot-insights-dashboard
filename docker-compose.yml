services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/copilot_insights
      NEXT_TELEMETRY_DISABLED: "1"
      # Auth.js + Keycloak. Override AUTH_KEYCLOAK_ISSUER to point at an
      # external Keycloak in production. AUTH_URL is the app's public origin.
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-insecure-secret-change-me}
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-copilot-insights-dashboard}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET:-dev-only-change-me}
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER:-http://keycloak:8080/realms/copilot-insights}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: unless-stopped
    networks:
      - appnet

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Frontchannel + backchannel share the `keycloak` hostname so the token
      # `iss` matches AUTH_KEYCLOAK_ISSUER for both the browser and the app
      # container. Browser access needs `127.0.0.1 keycloak` in /etc/hosts.
      KC_HOSTNAME: http://keycloak:8080
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped
    networks:
      - appnet

  db:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot_insights
    # Durability off for dev/test speed; tuned for ETL bulk-import from GitHub API
    command: >
      postgres
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=512MB
        -c max_connections=50
        -c wal_level=minimal
        -c max_wal_senders=0
        -c archive_mode=off
        -c max_wal_size=512MB
        -c checkpoint_timeout=15min
        -c checkpoint_completion_target=0.9
        -c default_statistics_target=200
        -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copilot_insights"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    shm_size: 512m
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
